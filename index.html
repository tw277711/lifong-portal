    <script>
    // 註冊 Service Worker 啟用 PWA 功能
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('利峰工作台 PWA 註冊成功！'))
                .catch(err => console.log('註冊失敗：', err));
        });
    }
    </script>
    
    <style>
        /* 基礎樣式重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊陰影 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background-color: #0f172a; /* 深藍底色，專業且省電 */
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 頂部標題欄 */
        header {
            background-color: #1e293b;
            padding: 20px 15px;
            text-align: center;
            border-bottom: 2px solid #38bdf8;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 1.4rem;
            letter-spacing: 1px;
            color: #38bdf8;
            margin-bottom: 5px;
        }

        header p {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* 主內容區：九宮格網格 */
        main {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 手機端單排 2 個按鈕，最容易點擊 */
            gap: 15px;
            align-content: start;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        /* 針對平板或大螢幕自動變為 3 排 */
        @media (min-width: 450px) {
            main {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 磁貼大按鈕樣式 */
        .tile-btn {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px 10px;
            text-decoration: none;
            color: #f8fafc;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        /* 手機按壓時的動態反饋 */
        .tile-btn:active {
            transform: scale(0.95);
            background-color: #334155;
            border-color: #38bdf8;
        }

        /* 圖標外圈 */
        .icon-wrapper {
            width: 55px;
            height: 55px;
            background-color: #0f172a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 1.5rem;
            color: #38bdf8; /* 圖標主顏色 */
        }

        /* 核心系統特別亮色突顯 */
        .tile-btn.highlight .icon-wrapper {
            background-color: #38bdf8;
            color: #0f172a;
        }

        .tile-btn span {
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
            line-height: 1.3;
        }

        /* 底部註腳 */
        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.75rem;
            color: #64748b;
            background-color: #0f172a;
        }
    </style>
</head>
