        });
    }

            color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 頂部標題欄 */
        header {
            background-color: #1e293b;
            padding: 20px 15px;
            text-align: center;
            border-bottom: 2px solid #38bdf8;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 1.4rem;
            letter-spacing: 1px;
            color: #38bdf8;
            margin-bottom: 5px;
        }

        header p {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* 主內容區：九宮格網格 */
        main {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 手機端單排 2 個按鈕，最容易點擊 */
            gap: 15px;
            align-content: start;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        /* 針對平板或大螢幕自動變為 3 排 */
        @media (min-width: 450px) {
            main {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 磁貼大按鈕樣式 */
        .tile-btn {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px 10px;
            text-decoration: none;
            color: #f8fafc;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            position: relative;
            cursor: pointer;
        }

        /* 手機按壓時的動態反饋 */
        .tile-btn:active {
            transform: scale(0.95);
            background-color: #334155;
            border-color: #38bdf8;
        }

        /* 圖標外圈 */
        .icon-wrapper {
            width: 55px;
            height: 55px;
            background-color: #0f172a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 1.5rem;
            color: #38bdf8; /* 圖標主顏色 */
        }

        /* 核心系統特別亮色突顯 */
        .tile-btn.highlight .icon-wrapper {
            background-color: #38bdf8;
            color: #0f172a;
        }

        /* 「設計」按鈕專屬樣式突顯 */
        .tile-btn.design-btn .icon-wrapper {
            color: #a855f7; /* 紫色識別，區隔一般系統 */
        }
        .tile-btn.design-btn:active {
            border-color: #a855f7;
        }

        .tile-btn span {
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
            line-height: 1.3;
        }

        /* ----------------------------------------- */
        /* 彈出遮罩層 (Modal) 樣式 */
        /* ----------------------------------------- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.85); /* 暗色背景遮罩 */
            backdrop-filter: blur(5px); /* 背景模糊特效 */
            display: flex;
            justify-content: center;
            align-items: flex-end; /* 手機版從底部彈出最順手 */
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: #1e293b;
            width: 100%;
            max-width: 600px;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.5);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 1px solid #334155;
        }

        .modal-header h2 {
            font-size: 1.2rem;
            color: #38bdf8;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        /* 次層圖面清單樣式 */
        .sub-menu-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sub-menu-item {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #f8fafc;
            font-weight: 500;
            font-size: 1.05rem;
            transition: all 0.2s;
        }

        .sub-menu-item i.item-icon {
            color: #a855f7;
            margin-right: 15px;
            font-size: 1.2rem;
        }

        .sub-menu-item i.arrow-icon {
            color: #64748b;
            font-size: 0.9rem;
        }

        .sub-menu-item:active {
            background-color: #334155;
            border-color: #a855f7;
            transform: scale(0.98);
        }

        /* 底部註腳 */
        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.75rem;
            color: #64748b;
            background-color: #0f172a;
        }
    </style>
</head>
