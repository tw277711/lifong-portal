<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- 網頁頁籤標題 -->
    <title>管理製程專區</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- iOS Safari 加入主畫面的專屬設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="管理製程專區">
    
    <!-- iOS / Android 加入主畫面的 App 圖示 -->
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-192.png">

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('管理製程 PWA 註冊成功！'))
                .catch(err => console.log('註冊失敗：', err));
        });
    }
    </script>

    <style>
        /* 基礎重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background-color: #0f172a; /* 深藍底色 */
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 頂部標題欄：樣式完全對齊「利峰工作台」 */
        header {
            background-color: #1e293b;
            padding: 20px 15px;
            text-align: center;
            border-bottom: 3px solid #10b981; /* 翡翠綠區隔主題色 */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        header h1 {
            font-size: 1.4rem; /* 完全對齊主工作台 1.4rem */
            letter-spacing: 1px;
            color: #10b981;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        header p {
            font-size: 0.85rem; /* 完全對齊主工作台 0.85rem */
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* 主容器：RWD 彈性佈局 */
        main {
            flex: 1;
            padding: 25px 20px;
            max-width: 600px; /* 完全對齊主工作台寬度限制 */
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 區塊標題 */
        .section-title {
            font-size: 0.95rem;
            color: #94a3b8;
            font-weight: 600;
            margin-top: 5px;
            margin-bottom: -4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 功能卡片通用樣式 */
        .action-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #f8fafc;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .action-card:active {
            transform: scale(0.98);
            background-color: #273549;
            border-color: #10b981;
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-box {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background-color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        /* 各卡片專屬色彩與圖示 */
        .card-dispatch .icon-box { color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); } /* 橘色：管理者調度 */
        .card-record .icon-box { color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); } /* 綠色：現場紀錄 */
        .card-board .icon-box { color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); }  /* 藍色：進度看板 */

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-desc {
            font-size: 0.82rem;
            color: #94a3b8;
            line-height: 1.3;
        }

        .arrow-icon {
            color: #64748b;
            font-size: 1.1rem;
        }

        /* 權限管制標籤 (管理者專用) */
        .role-badge {
            font-size: 0.72rem;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 500;
        }
        .role-badge.admin-only {
            background-color: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }
        .role-badge.field-use {
            background-color: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        /* 禁用狀態樣式 */
        .action-card.restricted {
            border-style: dashed;
            opacity: 0.85;
        }

        /* 自訂 Modal 提示彈窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            padding: 20px;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-box {
            background-color: #1e293b;
            border: 1px solid #475569;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .modal-box i.warn-icon {
            font-size: 2.8rem;
            color: #f59e0b;
            margin-bottom: 12px;
        }

        .modal-box h3 {
            font-size: 1.15rem;
            color: #f8fafc;
            margin-bottom: 8px;
        }

        .modal-box p {
            font-size: 0.88rem;
            color: #94a3b8;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .btn-modal {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .btn-close { background-color: #334155; color: #f8fafc; }
        .btn-proceed { background-color: #f59e0b; color: #0f172a; text-decoration: none; text-align: center; line-height: 1.2; }

        footer {
            text-align: center;
            padding: 20px 15px;
            font-size: 0.8rem;
            color: #64748b;
            background-color: #0f172a;
        }

        /* RWD 微調 */
        @media (max-width: 480px) {
            header h1 { font-size: 1.25rem; }
            .action-card { padding: 16px; }
            .icon-box { width: 46px; height: 46px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<header>
    <h1><i class="fa-solid fa-sliders"></i> 管理製程專區</h1>
    <p><i class="fa-solid fa-flask"></i> 試營運中</p>
</header>

<main>
    <!-- 1. 生管排程調度 -->
    <div class="section-title">
        <i class="fa-solid fa-user-shield"></i> 生管排程調度 (受限項目)
    </div>

    <div class="action-card card-dispatch restricted" onclick="checkAdminPermission(event)">
        <div class="card-left">
            <div class="icon-wrapper icon-box">
                <i class="fa-solid fa-user-gear"></i>
            </div>
            <div class="card-info">
                <div class="card-title">
                    調度 - 鍋爐組造排序
                    <span class="role-badge admin-only">生管及管理者</span>
                </div>
                <div class="card-desc">調整交貨優先序、組管圈與出貨月份模擬</div>
            </div>
        </div>
        <i class="fa-solid fa-lock arrow-icon" style="color: #ef4444;"></i>
    </div>

    <!-- 2. 現場作業與進度查詢 -->
    <div class="section-title" style="margin-top: 10px;">
        <i class="fa-solid fa-screws-mfg"></i> 現場作業與進度查詢
    </div>

    <!-- 紀錄 - 鍋爐工站作業 -->
    <a href="https://script.google.com/macros/s/AKfycbwg5BQlBFfeg1Veg8sBM4_oLVd0jPfLZhtZ_RXr4roiA0tVrPtw0Ob6NqU1S5LL8kjG/exec" 
       target="_blank" 
       class="action-card card-record">
        <div class="card-left">
            <div class="icon-wrapper icon-box">
                <i class="fa-solid fa-list-check"></i>
            </div>
            <div class="card-info">
                <div class="card-title">
                    紀錄 - 鍋爐工站作業
                    <span class="role-badge field-use">現場專用</span>
                </div>
                <div class="card-desc">工站完工即時回報、瀏覽完工歷史與撤銷作業</div>
            </div>
        </div>
        <i class="fa-solid fa-chevron-right arrow-icon"></i>
    </a>

    <!-- 看板 - 鍋爐製程進度 -->
    <a href="https://script.google.com/macros/s/AKfycbwg5BQlBFfeg1Veg8sBM4_oLVd0jPfLZhtZ_RXr4roiA0tVrPtw0Ob6NqU1S5LL8kjG/exec?view=dash" 
       target="_blank" 
       class="action-card card-board">
        <div class="card-left">
            <div class="icon-wrapper icon-box">
                <i class="fa-solid fa-chart-column"></i>
            </div>
            <div class="card-info">
                <div class="card-title">
                    看板 - 鍋爐製程進度
                    <span class="role-badge field-use">公開看板</span>
                </div>
                <div class="card-desc">全廠產能清單、加工節點動態與爐製品訂單</div>
            </div>
        </div>
        <i class="fa-solid fa-chevron-right arrow-icon"></i>
    </a>
</main>

<!-- 權限管制 Modal 彈窗 -->
<div class="modal-overlay" id="adminModal">
    <div class="modal-box">
        <i class="fa-solid fa-triangle-exclamation warn-icon"></i>
        <h3>管理者權限提醒</h3>
        <p>「調度 - 鍋爐組造排序」包含生管排程調整與出貨模擬功能，**現場同仁請勿隨意更動**。<br><br>如果您是生管或管理者，請點擊下方按鈕輸入密碼進入。</p>
        <div class="modal-actions">
            <button class="btn-modal btn-close" onclick="toggleAdminModal(false)">我是現場同仁 (返回)</button>
            <a id="adminRedirectBtn" 
               href="https://script.google.com/macros/s/AKfycbwg5BQlBFfeg1Veg8sBM4_oLVd0jPfLZhtZ_RXr4roiA0tVrPtw0Ob6NqU1S5LL8kjG/exec?view=mgmt" 
               target="_blank" 
               class="btn-modal btn-proceed" 
               onclick="toggleAdminModal(false)">進入生管登入頁</a>
        </div>
    </div>
</div>

<footer>
    <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
        <img src="logo-transparent.png" alt="" style="height: 18px; width: auto; display: inline-block;">
        <span>利峰機械有限公司 &copy; 2026</span>
    </div>
</footer>

<script>
    function toggleAdminModal(show) {
        const modal = document.getElementById('adminModal');
        if (show) {
            modal.classList.add('active');
        } else {
            modal.classList.remove('active');
        }
    }

    function checkAdminPermission(event) {
        event.preventDefault();
        toggleAdminModal(true);
    }
</script>

</body>
</html>
